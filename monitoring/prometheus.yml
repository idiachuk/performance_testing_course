global:
  # 5s (not 2s) on purpose: /metrics is served by the same single Node thread
  # the load tests saturate. With a 2s interval the scrape timeout is also 2s,
  # and during overload most scrapes time out — leaving gaps in the dashboard
  # exactly when things get interesting. 5s lets more samples survive; some
  # gaps under extreme load are expected (and are themselves a finding).
  scrape_interval: 5s
  scrape_timeout: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "load-test-service"
    metrics_path: /metrics
    static_configs:
      # The service runs in the same Docker Compose network, so Prometheus
      # reaches it by service name.
      #
      # If you prefer to run the service on your host (cd service && npm run
      # dev) for faster code-edit cycles, change the target to
      # "host.docker.internal:3000" — and on Linux also add
      #   extra_hosts: ["host.docker.internal:host-gateway"]
      # to the prometheus service in docker-compose.yml.
      - targets: ["service:3000"]
